name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - board: nice_nano_v2
            shield: charybdis_left
            keymap: qwerty
            artifact-name: charybdis_left

          - board: nice_nano_v2
            shield: charybdis_right
            keymap: qwerty
            artifact-name: charybdis_right

    steps:
      - name: Checkout user config
        uses: actions/checkout@v4

      - name: Checkout ZMK
        uses: actions/checkout@v4
        with:
          repository: zmkfirmware/zmk
          path: zmk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install West
        run: pip install west

      - name: Init West workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build firmware
        run: |
          west build -s zmk/app -b ${{ matrix.board }} \
            -- -DSHIELD=${{ matrix.shield }} \
               -DZMK_CONFIG=${{ github.workspace }}/config

      - name: Rename firmware
        run: |
          cp build/zephyr/zmk.uf2 ${{ matrix.artifact-name }}.uf2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.uf2
